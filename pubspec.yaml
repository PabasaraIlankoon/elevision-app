name: elephant_railway_alerts
description: A polished Flutter prototype for real-time railway elephant alerts.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.5.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_map: ^4.0.0
  latlong2: ^0.8.2
  url_launcher: ^6.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.10.0
flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
flutter_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
