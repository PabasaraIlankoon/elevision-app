name: elevision
description: "Elevision - Real-time railway security alert app using YOLO detection and Firebase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core - Required for all Firebase services
  firebase_core: ^3.6.0

  # Firebase Authentication - Owner login
  firebase_auth: ^5.3.1

  # Cloud Firestore - Real-time alert storage
  cloud_firestore: ^5.4.4

  # Firebase Storage - Alert image storage
  firebase_storage: ^12.3.3

  # Firebase Cloud Messaging - Push notifications
  firebase_messaging: ^15.1.3

  # Flutter Local Notifications - Show notifications when app is open
  flutter_local_notifications: ^17.2.3

  # Cached Network Image - Fast image loading with caching
  cached_network_image: ^3.4.1

  # Intl - Date/time formatting
  intl: ^0.19.0

  # Provider - State management
  provider: ^6.1.2
  flutter_map: ^5.0.0
  latlong2: ^0.9.0
  geolocator: ^9.0.2
  shared_preferences: ^2.2.0
  url_launcher: ^6.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.10.0

# launcher icon helper (run: flutter pub run flutter_launcher_icons:main)
flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/icon.jpeg
